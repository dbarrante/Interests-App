name: Release on version bump

# Automatically builds the Windows installer and creates a GitHub release + tag
# (vX.Y.Z) whenever the version in package.json changes on the master branch.

on:
  push:
    branches: [master]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.ver.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build Windows installer
        if: steps.check.outputs.exists == 'false'
        # Override the hardcoded local output dir (C:/Users/...) so artifacts
        # land in ./dist on the runner. Unsigned build (no cert configured).
        run: npx electron-builder --win nsis -c.directories.output=dist

      - name: Create release and attach installer
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${{ steps.ver.outputs.version }}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            "dist/Interests-App-Setup-${{ steps.ver.outputs.version }}.exe"
