<!DOCTYPE html>
<html>
<head>
<style>
body{width:240px;font-family:system-ui,sans-serif;padding:14px;margin:0;background:#1f1d1a;color:#f6f5f3}
h3{margin:0 0 12px;font-size:15px;font-weight:700;color:#fff}
button{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px}
.cap{background:#c2410c;color:#fff}
.cap:hover{filter:brightness(1.15)}
.cap:disabled{opacity:.5;cursor:wait}
.status{font-size:12px;color:#ccc;text-align:center;min-height:18px;margin-top:8px}
.info{font-size:11px;color:#6f6a62;margin-top:10px;padding-top:10px;border-top:1px solid #333}
</style>
</head>
<body>
<h3>Interests Capture</h3>
<button class="cap" id="captureBtn">Capture this page</button>
<div class="status" id="status"></div>
<div class="info" id="info"></div>
<script>
const btn = document.getElementById("captureBtn");
const status = document.getElementById("status");
const info = document.getElementById("info");

btn.onclick = function() {
  btn.disabled = true;
  btn.textContent = "Capturing...";
  status.textContent = "";
  chrome.runtime.sendMessage({ action: "manualCapture" }, function(resp) {
    if (chrome.runtime.lastError) {
      status.textContent = "Error: " + chrome.runtime.lastError.message;
      btn.textContent = "Capture this page";
      btn.disabled = false;
      return;
    }
    if (resp && resp.ok) {
      btn.textContent = "Captured!";
      status.textContent = "Card will update shortly";
      setTimeout(function(){ btn.textContent = "Capture this page"; btn.disabled = false; }, 2000);
    } else {
      status.textContent = resp ? resp.error : "No response from extension";
      btn.textContent = "Capture this page";
      btn.disabled = false;
    }
  });
};

chrome.storage.local.get("ia_capture_queue", function(stored) {
  var q = (stored && stored.ia_capture_queue) || [];
  info.textContent = "Queue: " + q.length + " capture(s)";
});
</script>
</body>
</html>
